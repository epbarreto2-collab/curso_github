<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicciones UFC - Premium</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #121214;
            color: #eeeeee;
            margin: 0;
            padding-bottom: 40px;
        }

        header {
            background: linear-gradient(135deg, #b70e0e 0%, #d20a0a 100%);
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            margin: 0;
            font-size: 2.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 1rem;
        }

        .container {
            width: 90%;
            max-width: 850px;
            margin: 30px auto 0 auto;
        }

        .card {
            background: #1e1e22;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid #2a2a30;
        }

        h2 {
            color: #ff4d4d;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-left: 4px solid #d20a0a;
            padding-left: 10px;
        }

        .fight {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 15px 10px;
            border-bottom: 1px solid #2a2a30;
        }

        .fight:last-of-type {
            border-bottom: none;
            margin-bottom: 25px;
        }

        .fighter-name {
            font-weight: 600;
            width: 35%;
        }

        .fighter-name.right {
            text-align: right;
        }

        select {
            background: #2a2a30;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #444;
            width: 200px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: #ff4d4d;
        }

        .btn-container {
            text-align: center;
        }

        button {
            background: #d20a0a;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(210, 10, 10, 0.3);
            text-transform: uppercase;
        }

        button:hover {
            background: #ff3c3c;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 60, 60, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            overflow: hidden;
            border-radius: 8px;
        }

        table th, table td {
            padding: 12px 15px;
            text-align: center;
        }

        table td {
            background: #252529;
            border-bottom: 1px solid #1e1e22;
        }

        table th {
            background: #d20a0a;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        table tr:last-child td {
            border-bottom: none;
        }

        /* Estilo responsivo para celulares */
        @media (max-width: 600px) {
            .fight {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .fighter-name, .fighter-name.right {
                width: 100%;
                text-align: center;
            }
            select {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>🥊 UFC Fight Predictions</h1>
    <p>Realiza tus predicciones para los próximos combates</p>
</header>

<div class="container">

    <div class="card">
        <h2>Cartelera Principal</h2>

        <div class="fight">
            <span class="fighter-name">Jon Jones</span>
            <select id="fight1">
                <option value="">Selecciona ganador</option>
                <option value="Jon Jones">Jon Jones</option>
                <option value="Tom Aspinall">Tom Aspinall</option>
            </select>
            <span class="fighter-name right">Tom Aspinall</span>
        </div>

        <div class="fight">
            <span class="fighter-name">Islam Makhachev</span>
            <select id="fight2">
                <option value="">Selecciona ganador</option>
                <option value="Islam Makhachev">Islam Makhachev</option>
                <option value="Charles Oliveira">Charles Oliveira</option>
            </select>
            <span class="fighter-name right">Charles Oliveira</span>
        </div>

        <div class="fight">
            <span class="fighter-name">Alex Pereira</span>
            <select id="fight3">
                <option value="">Selecciona ganador</option>
                <option value="Alex Pereira">Alex Pereira</option>
                <option value="Jamahal Hill">Jamahal Hill</option>
            </select>
